name: vrav_messenger
description: Decentralized Sovereign P2P Messenger with post-quantum hybrid X25519 & Kyber-768 cryptography, transient Pinata IPFS storage, CRDT chat logs, and Tor integration.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3

  # Platform & File System
  path_provider: ^2.1.1
  shared_preferences: ^2.2.1

  # Flutter Rust Bridge (Matching Cargo.toml version 1.80)
  flutter_rust_bridge: ^1.80.0

  # Visual Icons
  cupertino_icons: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    # Add assets if needed, e.g.:
    # - assets/images/
