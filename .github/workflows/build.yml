name: VRAV Messenger Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # 1. Настраиваем Java для Gradle
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 2. Настраиваем Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi
      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      # 3. Наш Python-патч для X25519 v2.0
      - name: Surgical Patch Crypto Core (Python Powered)
        run: |
          mkdir -p vrav-core/src

          cat << 'EOF' > vrav-core/src/crypto_bridge.rs
          use x25519_dalek::{StaticSecret, PublicKey};
          use aes_gcm::{aead::{Aead, KeyInit}, Aes256Gcm, Nonce};
          use rand::rngs::OsRng;
          use rand::RngCore;

          pub fn generate_keypair() -> (Vec<u8>, Vec<u8>) {
              let secret = StaticSecret::random_from_rng(OsRng);
              let public = PublicKey::from(&secret);
              (secret.to_bytes().to_vec(), public.as_bytes().to_vec())
          }

          pub fn derive_shared_secret(private_key: &[u8], remote_public_key: &[u8]) -> Vec<u8> {
              let mut priv_bytes = [0u8; 32];
              priv_bytes.copy_from_slice(&private_key[..32]);
              let secret = StaticSecret::from(priv_bytes);
              let mut pub_bytes = [0u8; 32];
              pub_bytes.copy_from_slice(&remote_public_key[..32]);
              let public = PublicKey::from(pub_bytes);
              secret.diffie_hellman(&public).as_bytes().to_vec()
          }

          pub fn encrypt_message(key: Vec<u8>, plaintext: Vec<u8>) -> Vec<u8> {
              let cipher = Aes256Gcm::new_from_slice(&key).unwrap();
              let mut nonce_bytes = [0u8; 12];
              rand::thread_rng().fill_bytes(&mut nonce_bytes);
              let nonce = Nonce::from_slice(&nonce_bytes);
              let mut ciphertext = cipher.encrypt(nonce, plaintext.as_slice()).unwrap();
              let mut result = nonce_bytes.to_vec();
              result.append(&mut ciphertext);
              result
          }

          pub fn decrypt_message(key: Vec<u8>, ciphertext: Vec<u8>) -> Vec<u8> {
              if ciphertext.len() < 12 { return vec![]; }
              let cipher = Aes256Gcm::new_from_slice(&key).unwrap();
              let nonce = Nonce::from_slice(&ciphertext[..12]);
              cipher.decrypt(nonce, &ciphertext[12..]).unwrap_or_default()
          }
          EOF

          python3 -c "
          import re
          with open('vrav-core/src/double_ratchet.rs', 'r') as f:
              content = f.read()
          content = re.sub(r'use x25519_dalek::\{[^}]+\};', 'use x25519_dalek::{StaticSecret, PublicKey};', content)
          content = content.replace('EphemeralSecret', 'StaticSecret')
          content = content.replace('StaticSecret::new(OsRng)', 'StaticSecret::random_from_rng(OsRng)')
          content = content.replace('StaticSecret::random_from_rng(&mut OsRng)', 'StaticSecret::random_from_rng(OsRng)')
          with open('vrav-core/src/double_ratchet.rs', 'w') as f:
              f.write(content)
          "

      # 4. Собираем библиотеки Rust (.so)
      - name: Build Rust Core
        run: |
          cd vrav-core
          cargo ndk -t aarch64-linux-android -o ../app/src/main/jniLibs build --release
          cargo ndk -t armv7-linux-androideabi -o ../app/src/main/jniLibs build --release

      # 5. Собираем APK глобально установленным утилитой gradle
      - name: Build Android APK via Global Gradle
        run: |
          gradle assembleRelease

      # 6. Публикуем готовые APK файлы в релизы
      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: app/build/outputs/apk/release/*.apk
          body: "Автоматический релиз VRAV Messenger v1.0.0. Архитектурные исправления применены, компиляция через глобальный Gradle завершена."
          draft: false
