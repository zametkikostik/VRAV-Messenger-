name: VRAV Messenger Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      # Автоматический поиск и сборка Rust-ядра
      - name: Build Rust Libraries
        run: |
          # Находим путь к папке, где лежит Cargo.toml
          CARGO_DIR=$(dirname $(find . -name "Cargo.toml" | head -n 1))
          echo "Rust project found in: $CARGO_DIR"
          
          # Собираем библиотеки
          cd $CARGO_DIR
          cargo ndk -t aarch64-linux-android -o ../android/app/src/main/jniLibs build --release
          cargo ndk -t armv7-linux-androideabi -o ../android/app/src/main/jniLibs build --release

      # Сборка Flutter APK
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vrav-messenger-apk
          path: build/app/outputs/flutter-apk/app-release.apk
