name: VRAV Messenger Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi
      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Auto-fix Rust EphemeralSecret
        run: |
          sed -i 's/EphemeralSecret/StaticSecret/g' vrav-core/src/crypto_bridge.rs
          sed -i 's/EphemeralSecret/StaticSecret/g' vrav-core/src/double_ratchet.rs

      - name: Build Rust Core
        run: |
          cd vrav-core
          cargo ndk -t aarch64-linux-android -o ../android/app/src/main/jniLibs build --release
          cargo ndk -t armv7-linux-androideabi -o ../android/app/src/main/jniLibs build --release

      - name: Build Flutter APK
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/app/outputs/flutter-apk/*.apk
          body: "Автоматический релиз VRAV Messenger. Интегрировано нативное ядро vrav-core (Rust + Kyber + X25519) с авто-патчем криптографии."
          draft: false
