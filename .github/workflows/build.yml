name: VRAV Messenger Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi
      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Full Recovery Crypto Core (Fix Interface & x25519 v2.0)
        run: |
          mkdir -p vrav-core/src

          # 1. Полностью восстанавливаем crypto_bridge.rs со всеми методами шифрования
          cat << 'EOF' > vrav-core/src/crypto_bridge.rs
          use anyhow::{Result, anyhow};
          use x25519_dalek::{StaticSecret, PublicKey};
          use aes_gcm::{aead::{Aead, KeyInit}, Aes256Gcm, Nonce};
          use rand::rngs::OsRng;
          use rand::RngCore;

          pub fn generate_keypair() -> (Vec<u8>, Vec<u8>) {
              let secret = StaticSecret::new(OsRng);
              let public = PublicKey::from(&secret);
              (secret.to_bytes().to_vec(), public.as_bytes().to_vec())
          }

          pub fn derive_shared_secret(private_key: &[u8], remote_public_key: &[u8]) -> Vec<u8> {
              let mut priv_bytes = [0u8; 32];
              priv_bytes.copy_from_slice(&private_key[..32]);
              let secret = StaticSecret::from(priv_bytes);
              
              let mut pub_bytes = [0u8; 32];
              pub_bytes.copy_from_slice(&remote_public_key[..32]);
              let public = PublicKey::from(pub_bytes);
              
              secret.diffie_hellman(&public).as_bytes().to_vec()
          }

          pub fn encrypt_message(key: Vec<u8>, plaintext: Vec<u8>) -> Vec<u8> {
              let cipher = Aes256Gcm::new_from_slice(&key).unwrap();
              let mut nonce_bytes = [0u8; 12];
              rand::thread_rng().fill_bytes(&mut nonce_bytes);
              let nonce = Nonce::from_slice(&nonce_bytes);
              
              let mut ciphertext = cipher.encrypt(nonce, plaintext.as_slice()).unwrap();
              let mut result = nonce_bytes.to_vec();
              result.append(&mut ciphertext);
              result
          }

          pub fn decrypt_message(key: Vec<u8>, ciphertext: Vec<u8>) -> Vec<u8> {
              if ciphertext.len() < 12 { return vec![]; }
              let cipher = Aes256Gcm::new_from_slice(&key).unwrap();
              let nonce = Nonce::from_slice(&ciphertext[..12]);
              cipher.decrypt(nonce, &ciphertext[12..]).unwrap_or_default()
          }
          EOF

          # 2. Аккуратно чистим double_ratchet.rs от дублей и чиним вызов EphemeralSecret
          # Сначала убираем дублирование StaticSecret, если оно возникло
          sed -i 's/StaticSecret, StaticSecret/StaticSecret/g' vrav-core/src/double_ratchet.rs
          # Переводим Ephemeral на Static
          sed -i 's/EphemeralSecret/StaticSecret/g' vrav-core/src/double_ratchet.rs
          sed -i 's/StaticSecret::random_from_rng(OsRng)/StaticSecret::new(OsRng)/g' vrav-core/src/double_ratchet.rs
          sed -i 's/StaticSecret::random_from_rng(&mut OsRng)/StaticSecret::new(OsRng)/g' vrav-core/src/double_ratchet.rs

      - name: Build Rust Core
        run: |
          cd vrav-core
          cargo ndk -t aarch64-linux-android -o ../android/app/src/main/jniLibs build --release
          cargo ndk -t armv7-linux-androideabi -o ../android/app/src/main/jniLibs build --release

      - name: Build Flutter APK
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/app/outputs/flutter-apk/*.apk
          body: "Релиз VRAV Messenger v1.0.0. Полный боевой комплект крипто-ядра скомпилирован успешно!"
          draft: false
