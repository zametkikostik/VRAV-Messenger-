name: VRAV Messenger Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. ОТЛАДКА: Выводим структуру папок, чтобы увидеть, где лежит Rust
      - name: Debug Project Structure
        run: ls -R

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      # 2. Сборка Rust (пока пропускаем, если не нашли Cargo.toml)
      - name: Build Rust Libraries
        run: |
          if [ -f "Cargo.toml" ]; then
            cargo ndk -t aarch64-linux-android -o ./android/app/src/main/jniLibs build --release
          elif [ -f "rust/Cargo.toml" ]; then
            cd rust
            cargo ndk -t aarch64-linux-android -o ../android/app/src/main/jniLibs build --release
          elif [ -f "native/Cargo.toml" ]; then
            cd native
            cargo ndk -t aarch64-linux-android -o ../android/app/src/main/jniLibs build --release
          else
            echo "Cargo.toml не найден в ожидаемых местах. Проверьте лог Debug Project Structure."
          fi

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vrav-messenger-apk
          path: build/app/outputs/flutter-apk/app-release.apk
