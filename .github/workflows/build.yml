name: VRAV Messenger Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug Structure
        run: ls -R

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Attempt Rust Build
        run: |
          if [ -f "Cargo.toml" ]; then
            cargo install cargo-ndk
            cargo ndk -t aarch64-linux-android -o ./android/app/src/main/jniLibs build --release
          else
            echo "Rust код не найден, пропускаем сборку Rust-ядра..."
          fi

      - name: Build APK
        run: |
          # Ищем папку с pubspec.yaml и собираем там
          FLUTTER_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          echo "Flutter проект в: $FLUTTER_DIR"
          cd "$FLUTTER_DIR"
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vrav-messenger-apk
          path: "**/app-release.apk"
